name: Build srs files
on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *" # 6:30 AM UTC+8
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: 初始化环境
        uses: actions/checkout@main

      - name: 设置环境变量
        shell: bash
        run: |
          echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 安装依赖
        shell: bash
        run: |
          pip install ruamel.yaml
    
      - name: 下载
        run: |
          curl -L -o convert.py "https://raw.githubusercontent.com/hosxy/anti-ad-rules/master/convert.py"
          curl -L -o reject-list.txt "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt"
          curl -L -o accelerate.txt "https://raw.githubusercontent.com/hosxy/anti-ad-rules/master/resource/accelerate.txt"
          curl -L -o pcdn.txt "https://raw.githubusercontent.com/hosxy/anti-ad-rules/master/resource/pcdn.txt"

          singbox_version=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .name)
          curl -L -o sing-box.tgz "https://github.com/SagerNet/sing-box/releases/download/v${singbox_version}/sing-box-${singbox_version}-linux-amd64.tar.gz"
          tar -xf sing-box.tgz
          cp sing-box-${singbox_version}-linux-amd64/sing-box sing-box
          sudo chmod a+x sing-box

          mihomo_version=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .name)
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${mihomo_version}/mihomo-linux-amd64-compatible-${mihomo_version}.gz"
          gzip -d mihomo.gz
          sudo chmod a+x mihomo
          

      - name: 转换成源文件格式
        run: |
          python convert.py reject-list
          python convert.py accelerate
          python convert.py pcdn

      - name: 转换成srs二进制规则文件
        run: |
          ./sing-box rule-set compile reject-list.json
          ./sing-box rule-set compile accelerate.json
          ./sing-box rule-set compile pcdn.json
          
      - name: 转换成mrs二进制规则文件
        run: |
          ./mihomo convert-ruleset domain yaml reject-list.yaml reject-list.mrs
          ./mihomo convert-ruleset domain yaml accelerate.yaml accelerate.mrs
          ./mihomo convert-ruleset domain yaml pcdn.yaml pcdn.mrs
          
      - name: 发布 srs
        run: |
          mkdir srs
          cd srs
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b srs
          
          cp ../reject-list.json ad.json
          cp ../reject-list.srs ad.srs
          
          cp ../accelerate.json accelerate.json
          cp ../accelerate.srs accelerate.srs

          cp ../pcdn.json pcdn.json
          cp ../pcdn.srs pcdn.srs

          git add .
          git commit -m "Released on ${{ env.BUILDTIME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin srs
          
      - name: 发布 mrs
        run: |
          mkdir mrs
          cd mrs
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b mrs
          
          cp ../reject-list.yaml ad.yaml
          cp ../reject-list.mrs ad.mrs
          
          cp ../accelerate.yaml accelerate.yaml
          cp ../accelerate.mrs accelerate.mrs

          cp ../pcdn.yaml pcdn.yaml
          cp ../pcdn.mrs pcdn.mrs

          git add .
          git commit -m "Released on ${{ env.BUILDTIME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin mrs
